name: Upstream Sync

on:
  schedule:
    - cron: "0 * * * *"  # every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Fetch upstream and fast-forward
        run: |
          git remote add upstream https://github.com/nextlevelbuilder/goclaw-docs.git
          git fetch upstream master

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/master)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Already up to date."
            exit 0
          fi

          # Fast-forward only — no merge commits
          git merge --ff-only upstream/master
          git push origin master
          echo "Synced to $UPSTREAM"
